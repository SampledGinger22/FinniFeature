# Local Postgres for dev parity only (spec §2). NOT the deploy path — production is
# Vercel Postgres (Neon). Credentials here are local-only and intentionally non-secret.
services:
  postgres:
    image: postgres:16-alpine
    container_name: finni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finni
      POSTGRES_PASSWORD: finni_local_dev
      POSTGRES_DB: finni
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finni -d finni"]
      interval: 5s
      timeout: 5s
      retries: 5
